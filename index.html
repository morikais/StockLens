<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#09090b;--card:#18181b;--card2:#1f1f23;--border:#27272a;--text:#fafafa;--muted:#71717a;--dim:#3f3f46;--green:#34d399;--red:#f87171;--blue:#60a5fa;--amber:#fbbf24;--purple:#a78bfa;--orange:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;min-height:100vh;padding-bottom:60px;}
.wrap{max-width:480px;margin:0 auto;padding:18px 14px;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.logo{font-size:22px;font-weight:900;letter-spacing:-.5px;}
.logo span{color:var(--green);}
.live-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{color:var(--muted);font-size:11px;}
.mkt-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.mkt-btn{padding:5px 12px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.mkt-btn.active{background:var(--green);color:#000;}
.api-box{background:#4285f415;border:1px solid #4285f440;border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.api-label{color:#60a5fa;font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.api-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:monospace;outline:none;}
.api-hint{color:var(--muted);font-size:11px;margin-top:5px;}
.tab-row{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;}
.tab-btn{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--border);color:var(--text);}
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 80px 12px 16px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:#34d39960;}
.search-input::placeholder{color:var(--dim);}
.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--green);border:none;border-radius:8px;padding:7px 14px;color:#000;font-weight:800;font-size:13px;cursor:pointer;}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;z-index:100;overflow:hidden;display:none;}
.autocomplete.show{display:block;}
.ac-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--border);}
.ac-ticker{color:var(--green);font-family:monospace;font-weight:700;margin-right:8px;}
.ac-name{color:var(--muted);}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:monospace;transition:all .2s;}
.pill:hover{border-color:#52525b;color:var(--text);}
.pill.active{background:#34d39920;border-color:#34d39940;color:var(--green);}
.wl-add-row{display:flex;gap:6px;margin-bottom:10px;}
.wl-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;}
.wl-input::placeholder{color:var(--dim);}
.wl-add-btn{background:var(--blue);border:none;border-radius:10px;padding:9px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
.wl-empty{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;line-height:1.8;}
.wl-item{display:flex;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.wl-item:hover{border-color:var(--dim);}
.wl-left{flex:1;}
.wl-ticker{font-family:monospace;font-weight:800;font-size:15px;margin-bottom:2px;}
.wl-name{color:var(--muted);font-size:12px;}
.wl-right{text-align:right;margin-right:10px;}
.wl-price{font-family:monospace;font-weight:700;font-size:14px;}
.wl-chg{font-size:12px;font-weight:600;margin-top:2px;}
.wl-del{background:transparent;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;}
.wl-del:hover{color:var(--red);}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.stock-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.badge-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.ticker-big{font-size:20px;font-weight:900;font-family:monospace;margin-right:4px;}
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid;}
.b-blue{background:#dbeafe20;color:var(--blue);border-color:#60a5fa40;}
.b-green{background:#d1fae520;color:var(--green);border-color:#34d39940;}
.b-red{background:#fee2e220;color:var(--red);border-color:#f8717140;}
.stock-name{color:#e4e4e7;font-size:14px;font-weight:600;margin-bottom:2px;}
.stock-sector{color:var(--muted);font-size:12px;}
.stock-price{font-size:26px;font-weight:900;font-family:monospace;}
.stock-chg{font-size:14px;font-weight:700;margin-top:3px;}
.stat-row{display:flex;gap:6px;margin-bottom:10px;}
.stat-box{flex:1;background:#09090b;border-radius:12px;padding:10px 12px;}
.stat-lbl{color:var(--muted);font-size:11px;margin-bottom:3px;}
.stat-val{color:var(--text);font-size:13px;font-weight:700;font-family:monospace;}
.stat-sub{font-size:11px;margin-top:2px;}
.earnings-row{background:#09090b;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.e-lbl{color:var(--muted);font-size:12px;}
.e-date{color:var(--amber);font-size:14px;font-weight:700;}
.e-eps{color:var(--muted);font-size:11px;}
.chart-ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.ctrl-group{display:flex;gap:2px;}
.ctrl-btn{padding:5px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.ctrl-btn.active{background:#34d39920;border:1px solid #34d39940;color:var(--green);}
.chart-wrap{height:180px;}
.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.accent{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.sec-title{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-card{background:#1a2035;border:1px solid #2a3050;border-radius:14px;padding:14px;}
.ic-label{color:#8892a4;font-size:11px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.ic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ic-title{color:var(--text);font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.3;}
.ic-body{color:#a0aec0;font-size:12px;line-height:1.6;}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.level-box{border-radius:12px;padding:10px 8px;text-align:center;border:1px solid;}
.level-lbl{font-size:10px;margin-bottom:4px;font-weight:600;}
.level-val{font-size:14px;font-weight:900;font-family:monospace;}
.outlook-card{background:#1a2035;border:1px solid #2a3050;border-radius:14px;padding:14px;}
.outlook-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #2a3050;}
.outlook-row:last-child{border-bottom:none;padding-bottom:0;}
.outlook-row:first-child{padding-top:0;}
.outlook-period{color:var(--muted);font-size:12px;min-width:72px;flex-shrink:0;padding-top:2px;}
.outlook-text{color:#e4e4e7;font-size:13px;line-height:1.6;}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sc-card{border-radius:14px;padding:14px;border:1px solid;}
.sc-bull{background:#052e16;border-color:#166534;}
.sc-bear{background:#2d0a0a;border-color:#7f1d1d;}
.sc-title{font-size:13px;font-weight:800;margin-bottom:8px;}
.sc-bull .sc-title{color:var(--green);}
.sc-bear .sc-title{color:var(--red);}
.sc-body{font-size:12px;line-height:1.6;color:#a0aec0;}
.spinner-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
.spinner{width:18px;height:18px;border:2px solid #34d39930;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{color:var(--muted);font-size:13px;}
.err-box{background:#f8717115;border:1px solid #f8717140;border-radius:12px;padding:12px 16px;margin-bottom:12px;color:var(--red);font-size:13px;}
.empty{text-align:center;padding:50px 0;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-txt{color:var(--muted);font-size:14px;}
.empty-hint{color:var(--dim);font-size:12px;margin-top:4px;}
.raw-body{color:#e4e4e7;font-size:13px;line-height:1.7;white-space:pre-wrap;}
.cursor{display:inline-block;width:7px;height:14px;background:var(--green);border-radius:2px;animation:blink .8s infinite;vertical-align:middle;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="live-row"><div class="live-dot"></div><span class="live-label">AI 주식 분석</span></div>
      <div class="logo">Stock<span>Lens</span></div>
    </div>
    <div class="mkt-toggle">
      <button class="mkt-btn active" onclick="switchMarket('US')">🇺🇸 US</button>
      <button class="mkt-btn" onclick="switchMarket('KR')">🇰🇷 KR</button>
    </div>
  </div>

  <div class="api-box">
    <div class="api-label">🔑 Google Gemini API 키</div>
    <input class="api-input" type="password" id="apiKey" placeholder="AIza..." oninput="saveKey(this.value)"/>
    <div class="api-hint">무료 · 키는 이 기기에만 저장됩니다</div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('analyze')">📊 종목 분석</button>
    <button class="tab-btn" onclick="switchTab('watchlist')">⭐ 내 보유 종목</button>
  </div>

  <div id="tabAnalyze">
    <div class="quick-row" id="quickRow"></div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="티커 또는 종목명 (예: 삼성전자, NVDA)" autocomplete="off"/>
      <button class="search-btn" onclick="doAnalyze()">분석</button>
      <div class="autocomplete" id="acList"></div>
    </div>
    <div id="analyzeContent">
      <div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">종목을 검색하거나 위 버튼을 눌러보세요</div><div class="empty-hint">한글 종목명 또는 티커 모두 지원</div></div>
    </div>
  </div>

  <div id="tabWatchlist" style="display:none;">
    <div class="wl-add-row">
      <input class="wl-input" id="wlInput" placeholder="티커 또는 종목명 입력 후 추가"/>
      <button class="wl-add-btn" onclick="addToWatchlist()">추가</button>
    </div>
    <div id="wlList"></div>
  </div>
</div>

<script>
const KR_STOCKS={
  '005930':{name:'삼성전자',aliases:['삼성','삼성전자'],sector:'반도체',exchange:'KOSPI',price:72400,changePct:-1.09,high52:88800,low52:56000,target:89000,upside:23.1,earnings:'7월 8일',eps:'2,100'},
  '000660':{name:'SK하이닉스',aliases:['하이닉스','sk하이닉스'],sector:'반도체',exchange:'KOSPI',price:198500,changePct:1.64,high52:238000,low52:127000,target:240000,upside:20.9,earnings:'7월 24일',eps:'8,400'},
  '035720':{name:'카카오',aliases:['카카오'],sector:'플랫폼/IT',exchange:'KOSPI',price:38150,changePct:-0.91,high52:58500,low52:32800,target:55000,upside:44.2,earnings:'5월 8일',eps:'320'},
  '035420':{name:'NAVER',aliases:['네이버','naver'],sector:'플랫폼/IT',exchange:'KOSPI',price:184500,changePct:0.82,high52:224000,low52:147000,target:230000,upside:24.7,earnings:'5월 9일',eps:'3,200'},
  '207940':{name:'삼성바이오로직스',aliases:['삼성바이오','바이오로직스'],sector:'바이오',exchange:'KOSPI',price:1015000,changePct:1.2,high52:1080000,low52:780000,target:1150000,upside:13.3,earnings:'5월 3일',eps:'9,800'},
  '006400':{name:'삼성SDI',aliases:['삼성sdi','sdi'],sector:'2차전지',exchange:'KOSPI',price:178500,changePct:-0.56,high52:398000,low52:152000,target:240000,upside:34.5,earnings:'4월 30일',eps:'3,200'},
  '051910':{name:'LG화학',aliases:['lg화학'],sector:'2차전지/화학',exchange:'KOSPI',price:298000,changePct:0.34,high52:480000,low52:262000,target:380000,upside:27.5,earnings:'5월 2일',eps:'8,400'},
  '005380':{name:'현대차',aliases:['현대차','현대자동차'],sector:'자동차',exchange:'KOSPI',price:202500,changePct:1.2,high52:265500,low52:178000,target:260000,upside:28.4,earnings:'4월 26일',eps:'5,600'},
  '000270':{name:'기아',aliases:['기아','기아차'],sector:'자동차',exchange:'KOSPI',price:88400,changePct:0.68,high52:118000,low52:74000,target:115000,upside:30.1,earnings:'4월 26일',eps:'3,200'},
  '105560':{name:'KB금융',aliases:['kb금융','kb'],sector:'금융',exchange:'KOSPI',price:84600,changePct:0.24,high52:98200,low52:61700,target:102000,upside:20.6,earnings:'5월 9일',eps:'14,500'},
};
const US_STOCKS={
  'ALAB':{name:'아스테라 랩스',aliases:['alab','astera'],sector:'AI 인프라',exchange:'NASDAQ',price:120.31,changePct:0.34,high52:262.9,low52:47.13,target:206.75,upside:71.9,earnings:'5월 12일',eps:'9.6'},
  'NVDA':{name:'엔비디아',aliases:['nvda','nvidia','엔비디아'],sector:'반도체/AI',exchange:'NASDAQ',price:875.4,changePct:1.42,high52:974.0,low52:461.0,target:1050.0,upside:19.9,earnings:'5월 22일',eps:'5.58'},
  'META':{name:'메타',aliases:['meta','메타'],sector:'소셜미디어',exchange:'NASDAQ',price:512.8,changePct:-0.62,high52:589.0,low52:351.0,target:620.0,upside:20.9,earnings:'4월 30일',eps:'4.98'},
  'MSFT':{name:'마이크로소프트',aliases:['msft','microsoft','마이크로소프트'],sector:'클라우드/AI',exchange:'NASDAQ',price:418.6,changePct:0.5,high52:468.4,low52:362.9,target:510.0,upside:21.8,earnings:'4월 24일',eps:'2.94'},
  'TSLA':{name:'테슬라',aliases:['tsla','tesla','테슬라'],sector:'전기차',exchange:'NASDAQ',price:178.2,changePct:-2.46,high52:299.3,low52:138.8,target:220.0,upside:23.5,earnings:'4월 23일',eps:'0.58'},
  'AAPL':{name:'애플',aliases:['aapl','apple','애플'],sector:'빅테크',exchange:'NASDAQ',price:213.4,changePct:0.82,high52:237.2,low52:164.1,target:240.0,upside:12.5,earnings:'5월 1일',eps:'1.58'},
  'GOOGL':{name:'구글',aliases:['googl','google','구글','알파벳'],sector:'빅테크/AI',exchange:'NASDAQ',price:172.5,changePct:1.1,high52:196.0,low52:130.7,target:210.0,upside:21.7,earnings:'4월 29일',eps:'1.92'},
  'AMZN':{name:'아마존',aliases:['amzn','amazon','아마존'],sector:'이커머스/클라우드',exchange:'NASDAQ',price:185.2,changePct:0.45,high52:242.5,low52:158.3,target:230.0,upside:24.2,earnings:'5월 1일',eps:'1.12'},
};
const QUICK_US=['NVDA','META','MSFT','ALAB','TSLA','AAPL'];
const QUICK_KR=['005930','000660','035720','035420','005380','000270'];

let market='US',abortCtrl=null,mainChart=null;
let priceHist=[],rsiHist=[],chartTab='price',timeRange=90;
let watchlist=JSON.parse(localStorage.getItem('stocklens_wl')||'[]');

function getDB(){return market==='KR'?KR_STOCKS:US_STOCKS;}
function fmt(v){return market==='KR'?`₩${Number(v).toLocaleString()}`:`$${v}`;}
function getKey(){return localStorage.getItem('stocklens_gemini_key')||'';}
function saveKey(v){localStorage.setItem('stocklens_gemini_key',v);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function findByQuery(q,db){
  const lq=q.toLowerCase().trim();
  for(const[ticker,info]of Object.entries(db)){
    if(ticker.toLowerCase()===lq)return{ticker,info};
    if(info.name.toLowerCase().includes(lq))return{ticker,info};
    if(info.aliases&&info.aliases.some(a=>a.toLowerCase().includes(lq)))return{ticker,info};
  }
  return null;
}
function getSugg(q,db){
  if(!q)return[];
  const lq=q.toLowerCase();
  return Object.entries(db).filter(([t,i])=>t.toLowerCase().includes(lq)||i.name.toLowerCase().includes(lq)||(i.aliases&&i.aliases.some(a=>a.toLowerCase().includes(lq)))).slice(0,5).map(([t,i])=>({ticker:t,info:i}));
}
function genHistory(price,days=90){
  const d=[];let cur=price*(0.75+Math.random()*.15);
  for(let i=days;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);cur=Math.max(cur+(Math.random()-.48)*cur*.025,price*.3);if(i===0)cur=price;d.push({label:`${dt.getMonth()+1}/${dt.getDate()}`,price:+cur.toFixed(2),volume:Math.floor(Math.random()*5e6+1e6)});}
  return d;
}
function genRsi(days=90){
  const d=[];let r=45+Math.random()*20;
  for(let i=days;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);r=Math.min(85,Math.max(20,r+(Math.random()-.5)*8));d.push({label:`${dt.getMonth()+1}/${dt.getDate()}`,rsi:+r.toFixed(1)});}
  return d;
}

function switchMarket(m){
  market=m;
  document.querySelectorAll('.mkt-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(m)));
  document.getElementById('searchInput').value='';
  document.getElementById('analyzeContent').innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">종목을 검색하거나 위 버튼을 눌러보세요</div></div>';
  renderQuickRow();
}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='analyze'?0:1)));
  document.getElementById('tabAnalyze').style.display=t==='analyze'?'':'none';
  document.getElementById('tabWatchlist').style.display=t==='watchlist'?'':'none';
  if(t==='watchlist')renderWatchlist();
}
function renderQuickRow(){
  const q=market==='KR'?QUICK_KR:QUICK_US;const db=getDB();
  document.getElementById('quickRow').innerHTML=q.map(t=>{const label=market==='KR'?(db[t]?.name?.slice(0,4)||t):t;return`<button class="pill" onclick="quickPick('${t}',this)">${label}</button>`;}).join('');
}
function quickPick(t,btn){
  document.getElementById('searchInput').value=t;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');hideAc();doAnalyze(t);
}
function initSearch(){
  const inp=document.getElementById('searchInput');
  // restore saved key
  const saved=getKey();
  if(saved)document.getElementById('apiKey').value=saved;

  inp.addEventListener('input',()=>{
    const q=inp.value.trim();const sugg=getSugg(q,getDB());const ac=document.getElementById('acList');
    if(!q||!sugg.length){ac.classList.remove('show');return;}
    ac.innerHTML=sugg.map(({ticker,info})=>`<div class="ac-item" onclick="selectAc('${ticker}')"><span class="ac-ticker">${ticker}</span><span class="ac-name">${info.name}</span></div>`).join('');
    ac.classList.add('show');
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){hideAc();doAnalyze();}});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))hideAc();});
  document.getElementById('wlInput').addEventListener('keydown',e=>{if(e.key==='Enter')addToWatchlist();});
  renderQuickRow();renderWatchlist();
}
function selectAc(t){document.getElementById('searchInput').value=t;hideAc();doAnalyze(t);}
function hideAc(){document.getElementById('acList').classList.remove('show');}

async function doAnalyze(forceTicker){
  const raw=(forceTicker||document.getElementById('searchInput').value).trim();
  if(!raw)return;
  const found=findByQuery(raw,getDB());
  const ticker=found?found.ticker:raw.toUpperCase();
  const info=found?found.info:{name:ticker,aliases:[],sector:'기술주',exchange:market==='KR'?'KOSPI':'NASDAQ',price:+(Math.random()*200+50).toFixed(2),changePct:+(Math.random()*5-2.5).toFixed(2),high52:+(Math.random()*300+100).toFixed(1),low52:+(Math.random()*50+20).toFixed(2),target:+(Math.random()*250+80).toFixed(2),upside:+(Math.random()*60+10).toFixed(1),earnings:'미정',eps:'-'};
  if(abortCtrl)abortCtrl.abort();abortCtrl=new AbortController();
  priceHist=genHistory(info.price);rsiHist=genRsi();
  const pos=info.changePct>=0;
  const hd=(((info.high52-info.price)/info.high52)*100).toFixed(1);
  document.getElementById('analyzeContent').innerHTML=`
    <div class="card">
      <div class="stock-top">
        <div><div class="badge-row"><span class="ticker-big">${ticker}</span><span class="badge b-blue">${info.exchange}</span><span class="badge ${pos?'b-green':'b-red'}">${pos?'▲':'▼'}</span></div><div class="stock-name">${info.name}</div><div class="stock-sector">${info.sector}</div></div>
        <div style="text-align:right"><div class="stock-price">${fmt(info.price)}</div><div class="stock-chg" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}${info.changePct}%</div></div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-lbl">52주 최고</div><div class="stat-val">${fmt(info.high52)}</div><div class="stat-sub" style="color:var(--red)">고대비 -${hd}%</div></div>
        <div class="stat-box"><div class="stat-lbl">목표가</div><div class="stat-val">${fmt(info.target)}</div><div class="stat-sub" style="color:var(--green)">+${info.upside}% 상승여력</div></div>
      </div>
      <div class="earnings-row"><span class="e-lbl">다음 실적</span><span class="e-date">${info.earnings}</span><span class="e-eps">EPS ${market==='KR'?'₩':'$'}${info.eps}</span></div>
    </div>
    <div class="card" id="chartCard">
      <div class="chart-ctrl">
        <div class="ctrl-group">
          <button class="ctrl-btn active" onclick="switchCT('price',this)">가격</button>
          <button class="ctrl-btn" onclick="switchCT('volume',this)">거래량</button>
          <button class="ctrl-btn" onclick="switchCT('rsi',this)">RSI</button>
        </div>
        <div class="ctrl-group">
          <button class="ctrl-btn" onclick="switchRange(30,this)">30일</button>
          <button class="ctrl-btn" onclick="switchRange(60,this)">60일</button>
          <button class="ctrl-btn active" onclick="switchRange(90,this)">90일</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
    <div id="spinArea"></div><div id="aiCards"></div>`;
  renderChart();
  await callGemini(ticker,info);
}

function switchCT(t,btn){chartTab=t;document.querySelectorAll('#chartCard .ctrl-btn').forEach(b=>{if(['가격','거래량','RSI'].includes(b.textContent))b.classList.remove('active');});btn.classList.add('active');renderChart();}
function switchRange(r,btn){timeRange=r;document.querySelectorAll('#chartCard .ctrl-btn').forEach(b=>{if(['30일','60일','90일'].includes(b.textContent))b.classList.remove('active');});btn.classList.add('active');renderChart();}

function renderChart(){
  if(mainChart){mainChart.destroy();mainChart=null;}
  const canvas=document.getElementById('mainChart');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const ph=priceHist.slice(-timeRange);const rh=rsiHist.slice(-timeRange);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#27272a',titleColor:'#71717a',bodyColor:'#fafafa',borderColor:'#3f3f46',borderWidth:1}},scales:{x:{grid:{color:'#27272a'},ticks:{color:'#52525b',maxTicksLimit:6,font:{size:10}}},y:{grid:{color:'#27272a'},ticks:{color:'#52525b',font:{size:10}}}}};
  if(chartTab==='price'){mainChart=new Chart(ctx,{type:'line',data:{labels:ph.map(d=>d.label),datasets:[{data:ph.map(d=>d.price),borderColor:'#34d399',borderWidth:2,fill:true,backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,'#34d39925');g.addColorStop(1,'#34d39900');return g;},pointRadius:0,tension:.4}]},options:{...base,scales:{...base.scales,y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>market==='KR'?`₩${(v/1000).toFixed(0)}K`:`$${v}`}}}}});}
  else if(chartTab==='volume'){mainChart=new Chart(ctx,{type:'bar',data:{labels:ph.map(d=>d.label),datasets:[{data:ph.map(d=>d.volume),backgroundColor:'#60a5fa80',borderRadius:2}]},options:{...base,scales:{...base.scales,y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>`${(v/1e6).toFixed(1)}M`}}}}});}
  else{mainChart=new Chart(ctx,{type:'line',data:{labels:rh.map(d=>d.label),datasets:[{data:rh.map(d=>d.rsi),borderColor:'#a78bfa',borderWidth:2,pointRadius:0,tension:.4,fill:false}]},options:{...base,scales:{...base.scales,y:{...base.scales.y,min:0,max:100,ticks:{...base.scales.y.ticks,stepSize:20}}}}});}
}

// ═══ GEMINI API ═══
async function callGemini(ticker,info){
  const apiKey=document.getElementById('apiKey').value.trim()||getKey();
  if(!apiKey){document.getElementById('spinArea').innerHTML='<div class="err-box">⚠️ Gemini API 키를 먼저 입력해주세요</div>';return;}
  document.getElementById('spinArea').innerHTML='<div class="spinner-row"><div class="spinner"></div><span class="spin-txt">AI가 분석 리포트를 작성하고 있습니다…</span></div>';
  const pf=market==='KR'?`₩${Number(info.price).toLocaleString()}`:`$${info.price}`;
  const prompt=`당신은 전문 주식 분석가입니다. ${ticker} (${info.name}) 종목의 기술적 분석을 아래 형식으로 정확히 작성하세요.

현재 데이터: 현재가 ${pf}, 등락 ${info.changePct>=0?'+':''}${info.changePct}%, 52주고 ${fmt(info.high52)}/저 ${fmt(info.low52)}, 목표가 ${fmt(info.target)}(+${info.upside}%), 다음실적 ${info.earnings}

반드시 아래 구분자와 필드명을 그대로 사용하세요:

[기술분석]
이동평균선_제목: 한 줄 핵심 결론
이동평균선_내용: 2-3문장 설명
추세방향_제목: 한 줄 핵심 결론
추세방향_내용: 2-3문장 설명

[모멘텀]
RSI_제목: RSI 수치 포함 제목
RSI_내용: 2-3문장
RSI_신호: green 또는 red 또는 yellow
MACD_제목: 한 줄
MACD_내용: 2-3문장
MACD_신호: green 또는 red 또는 yellow

[거래량]
거래량패턴_제목: 한 줄
거래량패턴_내용: 2-3문장
거래량패턴_신호: green 또는 red 또는 yellow
볼린저밴드_제목: 한 줄
볼린저밴드_내용: 2-3문장
볼린저밴드_신호: green 또는 red 또는 yellow

[지지저항]
강한지지: 숫자만
지지2: 숫자만
피벗: 숫자만
저항1: 숫자만
저항2: 숫자만
전고점: 숫자만

[투자전망]
단기: 1~2주 전망 2-3문장
중기: 1~3개월 전망 2-3문장

[시나리오]
강세_내용: 강세 시나리오 3-4문장, 목표가 포함
약세_내용: 약세 시나리오 3-4문장, 목표가 포함

한국어로 작성하세요.`;

  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal:abortCtrl.signal,
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:2000}})
    });
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e?.error?.message||`오류 ${resp.status}`);}
    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    document.getElementById('spinArea').innerHTML='';
    renderCards(text,false);
  }catch(e){
    if(e.name!=='AbortError'){
      document.getElementById('spinArea').innerHTML='';
      document.getElementById('aiCards').innerHTML=`<div class="err-box">⚠️ ${esc(e.message||'오류가 발생했습니다.')}</div>`;
    }
  }
}

function pf(text,key){const re=new RegExp(`${key}:\\s*(.+?)(?=\\n\\S|$)`,'s');const m=text.match(re);return m?m[1].trim():'';}
function hasSec(text,tag){return text.includes(`[${tag}]`);}
function dotClr(s){const v=(s||'').toLowerCase();return v==='green'?'var(--green)':v==='red'?'var(--red)':'var(--amber)';}

function renderCards(text,streaming){
  let html='';
  if(hasSec(text,'기술분석')){
    const ma_t=pf(text,'이동평균선_제목'),ma_b=pf(text,'이동평균선_내용'),tr_t=pf(text,'추세방향_제목'),tr_b=pf(text,'추세방향_내용');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#f87171"></div><div class="sec-title">추세 분석 · 이동평균</div></div><div class="grid2"><div class="info-card"><div class="ic-label">이동평균선 (20/50/200일)</div>${ma_t?`<div class="ic-title">${esc(ma_t)}</div>`:''}<div class="ic-body">${esc(ma_b)}</div></div><div class="info-card"><div class="ic-label" style="justify-content:space-between">추세 방향 <span class="ic-dot" style="background:var(--red)"></span></div>${tr_t?`<div class="ic-title">${esc(tr_t)}</div>`:''}<div class="ic-body">${esc(tr_b)}</div></div></div></div>`;
  }
  if(hasSec(text,'모멘텀')){
    const rt=pf(text,'RSI_제목'),rb=pf(text,'RSI_내용'),rs=pf(text,'RSI_신호'),mt=pf(text,'MACD_제목'),mb=pf(text,'MACD_내용'),ms=pf(text,'MACD_신호');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#fb923c"></div><div class="sec-title">모멘텀 지표</div></div><div class="grid2"><div class="info-card"><div class="ic-label" style="justify-content:space-between">RSI (14) <span class="ic-dot" style="background:${dotClr(rs)}"></span></div>${rt?`<div class="ic-title">${esc(rt)}</div>`:''}<div class="ic-body">${esc(rb)}</div></div><div class="info-card"><div class="ic-label" style="justify-content:space-between">MACD <span class="ic-dot" style="background:${dotClr(ms)}"></span></div>${mt?`<div class="ic-title">${esc(mt)}</div>`:''}<div class="ic-body">${esc(mb)}</div></div></div></div>`;
  }
  if(hasSec(text,'거래량')){
    const vt=pf(text,'거래량패턴_제목'),vb=pf(text,'거래량패턴_내용'),vs=pf(text,'거래량패턴_신호'),bt=pf(text,'볼린저밴드_제목'),bb_=pf(text,'볼린저밴드_내용'),bs=pf(text,'볼린저밴드_신호');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#fbbf24"></div><div class="sec-title">거래량 분석</div></div><div class="grid2"><div class="info-card"><div class="ic-label" style="justify-content:space-between">거래량 패턴 <span class="ic-dot" style="background:${dotClr(vs)}"></span></div>${vt?`<div class="ic-title">${esc(vt)}</div>`:''}<div class="ic-body">${esc(vb)}</div></div><div class="info-card"><div class="ic-label" style="justify-content:space-between">볼린저밴드 (20,2) <span class="ic-dot" style="background:${dotClr(bs)}"></span></div>${bt?`<div class="ic-title">${esc(bt)}</div>`:''}<div class="ic-body">${esc(bb_)}</div></div></div></div>`;
  }
  if(hasSec(text,'지지저항')){
    const isKr=market==='KR';const fv=v=>v?(isKr?`₩${Number(v).toLocaleString()}`:`$${v}`):'–';
    const s1=pf(text,'강한지지'),s2=pf(text,'지지2'),pv=pf(text,'피벗'),r1=pf(text,'저항1'),r2=pf(text,'저항2'),ath=pf(text,'전고점');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#60a5fa"></div><div class="sec-title">주요 지지 / 저항 레벨</div></div><div class="level-grid"><div class="level-box" style="background:#0c1f3f;border-color:#1e3a5f"><div class="level-lbl" style="color:#60a5fa">강한 지지</div><div class="level-val" style="color:#93c5fd">${fv(s1)}</div></div><div class="level-box" style="background:#0c1f3f;border-color:#1e3a5f"><div class="level-lbl" style="color:#60a5fa">지지 2</div><div class="level-val" style="color:#93c5fd">${fv(s2)}</div></div><div class="level-box" style="background:#1a1040;border-color:#3b2d8c"><div class="level-lbl" style="color:#a78bfa">피벗</div><div class="level-val" style="color:#c4b5fd">${fv(pv)}</div></div><div class="level-box" style="background:#2d0a0a;border-color:#7f1d1d"><div class="level-lbl" style="color:#f87171">저항 1</div><div class="level-val" style="color:#fca5a5">${fv(r1)}</div></div><div class="level-box" style="background:#1e1040;border-color:#4c1d95"><div class="level-lbl" style="color:#a78bfa">저항 2</div><div class="level-val" style="color:#c4b5fd">${fv(r2)}</div></div><div class="level-box" style="background:#1a1200;border-color:#78350f"><div class="level-lbl" style="color:#fbbf24">전고점(ATH)</div><div class="level-val" style="color:#fde68a">${fv(ath)}</div></div></div></div>`;
  }
  if(hasSec(text,'투자전망')){
    const st=pf(text,'단기'),mt_=pf(text,'중기');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#a78bfa"></div><div class="sec-title">투자 전망</div></div><div class="outlook-card">${st?`<div class="outlook-row"><div class="outlook-period">단기 (1~2주)</div><div class="outlook-text">${esc(st)}</div></div>`:''} ${mt_?`<div class="outlook-row"><div class="outlook-period">중기 (1~3개월)</div><div class="outlook-text">${esc(mt_)}</div></div>`:''}</div></div>`;
  }
  if(hasSec(text,'시나리오')){
    const bull=pf(text,'강세_내용'),bear=pf(text,'약세_내용');
    html+=`<div class="card"><div class="section-hdr"><div class="accent" style="background:#34d399"></div><div class="sec-title">시나리오 분석</div></div><div class="scenario-grid"><div class="sc-card sc-bull"><div class="sc-title">강세 시나리오</div><div class="sc-body">${esc(bull)}</div></div><div class="sc-card sc-bear"><div class="sc-title">약세 시나리오</div><div class="sc-body">${esc(bear)}</div></div></div></div>`;
  }
  if(!html&&text.trim()){html=`<div class="card"><div class="section-hdr"><div class="accent" style="background:var(--green)"></div><div class="sec-title">AI 분석</div></div><div class="raw-body">${esc(text)}</div></div>`;}
  document.getElementById('aiCards').innerHTML=html;
}

function saveWL(){localStorage.setItem('stocklens_wl',JSON.stringify(watchlist));}
function addToWatchlist(){
  const raw=document.getElementById('wlInput').value.trim();if(!raw)return;
  let found=findByQuery(raw,KR_STOCKS)||findByQuery(raw,US_STOCKS);
  if(!found)found={ticker:raw.toUpperCase(),info:{name:raw.toUpperCase(),exchange:'?',price:0,changePct:0}};
  const e={ticker:found.ticker,name:found.info.name,exchange:found.info.exchange,market:KR_STOCKS[found.ticker]?'KR':'US',price:found.info.price,changePct:found.info.changePct};
  if(watchlist.some(w=>w.ticker===e.ticker)){document.getElementById('wlInput').value='';return;}
  watchlist.push(e);saveWL();document.getElementById('wlInput').value='';renderWatchlist();
}
function removeFromWatchlist(ticker){watchlist=watchlist.filter(w=>w.ticker!==ticker);saveWL();renderWatchlist();}
function renderWatchlist(){
  const el=document.getElementById('wlList');if(!el)return;
  if(!watchlist.length){el.innerHTML='<div class="wl-empty">아직 추가된 종목이 없어요<br><span style="font-size:12px;color:var(--dim)">위 입력창에 종목명이나 티커를 입력해보세요</span></div>';return;}
  el.innerHTML=watchlist.map(w=>{
    const pos=parseFloat(w.changePct)>=0;
    const ps=w.price?(w.market==='KR'?`₩${Number(w.price).toLocaleString()}`:`$${w.price}`):'–';
    return`<div class="wl-item" onclick="analyzeFromWL('${w.ticker}','${w.market}')"><div class="wl-left"><div class="wl-ticker">${w.ticker}</div><div class="wl-name">${w.name} · ${w.exchange}</div></div><div class="wl-right"><div class="wl-price">${ps}</div><div class="wl-chg" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}${w.changePct}%</div></div><button class="wl-del" onclick="event.stopPropagation();removeFromWatchlist('${w.ticker}')">×</button></div>`;
  }).join('');
}
function analyzeFromWL(ticker,mkt){
  market=mkt;document.querySelectorAll('.mkt-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(mkt)));
  switchTab('analyze');document.getElementById('searchInput').value=ticker;renderQuickRow();doAnalyze(ticker);
}
window.addEventListener('DOMContentLoaded',initSearch);
</script>
